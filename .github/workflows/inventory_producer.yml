name: Inventory Producer

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration (seconds)"
        required: true
        default: "60"

      rate:
        description: "Ticks per second"
        required: true
        default: "3"

      num_combos:
        description: "Store/Product combinations"
        required: true
        default: "300"

jobs:
  produce-inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_API_KEY=${{ secrets.KAFKA_API_KEY }}
          KAFKA_API_SECRET=${{ secrets.KAFKA_API_SECRET }}
          KAFKA_INVENTORY_TOPIC=${{ secrets.KAFKA_INVENTORY_TOPIC }}
          EOF

      - name: Verify files
        run: |
          pwd
          ls -R
          ls data

      - name: Run Inventory Producer
        run: |
          python inventory_producer.py \
            --stores-csv data/MavenMarket_Stores.csv \
            --products-csv data/MavenMarket_Products.csv \
            --topic inventory \
            --num-combos "${{ github.event.inputs.num_combos }}" \
            --rate "${{ github.event.inputs.rate }}" \
            --duration "${{ github.event.inputs.duration }}"
