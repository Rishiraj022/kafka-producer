name: Orders Producer

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration (seconds)"
        required: true
        default: "150"

      rate:
        description: "Orders per second"
        required: true
        default: "5"

      new_customer_rate:
        description: "Fraction of new customers (0-1)"
        required: true
        default: "0"

jobs:
  produce-orders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << EOF
          KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_API_KEY=${{ secrets.KAFKA_API_KEY }}
          KAFKA_API_SECRET=${{ secrets.KAFKA_API_SECRET }}
          KAFKA_ORDERS_TOPIC=${{ secrets.KAFKA_ORDERS_TOPIC }}
          EOF

      - name: Verify files
        run: |
          pwd
          ls -R
          ls data

      - name: Run Orders Producer
        run: |
          python orders_producer.py \
            --stores-csv data/MavenMarket_Stores.csv \
            --products-csv data/MavenMarket_Products.csv \
            --customers-csv data/MavenMarket_Customers.csv \
            --topic orders \
            --rate "${{ github.event.inputs.rate }}" \
            --new-customer-rate "${{ github.event.inputs.new_customer_rate }}" \
            --duration "${{ github.event.inputs.duration }}"
